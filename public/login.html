<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: 
            radial-gradient(55% 330%, rgba(255, 255, 255, 0.5) 0%, rgba(0, 0, 0, 0.5) 550%), 
            linear-gradient(to top, rgba(255, 255, 255, 0.5) 0%, rgba(0, 0, 0, 0.6) 50%), 
            linear-gradient(to top right, rgba(255, 255, 255, 0.3) 0%, rgba(0, 0, 0, 0.3) 120%);
        background-color: #DFE3E4;
        background-blend-mode: color-burn, screen, color-burn;
    }

    .card {
      /* border: 2px solid #00000060; */
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 3px 15px #00000060;
    }

    h1 {
      color: #222;
      margin-bottom: 20px;
      text-align: center;
      font-size: 30px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      border: 2px solid #6588b381;
      border-radius: 8px;
      color: #000;
      font-size: 15px;
      margin-bottom: 18px;
      outline: none;
      transition: all 0.3s ease-in-out;
    }

    input:focus {
      border-color: #0076dd7b;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #6e98ec;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
    }

    button:hover {
      background: #3771e4;
    }

    .error {
      color: #f55;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>账号登录</h1>
    <input type="text" id="username" placeholder="用户名" autocomplete="username">
    <input type="password" id="password" placeholder="密码" autocomplete="current-password">
    <button id="login_btn" onclick="login()">登 录</button>
    <div class="error" id="error"></div>
  </div>
  <script>
    const login_btn = document.getElementById('login_btn');
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const error_box = document.getElementById("error");
      error_box.textContent = "";
      if (!username || !password) { error_box.textContent = '请输入用户名和密码'; return }
      try {
        login_btn.disabled = true;
        const res = await fetch("/login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const contentType = res.headers.get("content-type") || "";
        const data = contentType.includes("application/json")
          ? await res.json()
          : { success: false, message: await res.text() };

        if (data.success) {
          const urlParams = new URLSearchParams(window.location.search);
          const redirectTo = urlParams.get('redirect') || '/';
          window.location.href = redirectTo;
        } else {
          error_box.textContent = data.message || "登录失败";
        }
      } catch (error) {
        error_box.textContent = error?.message || "登录失败";
      } finally {
        login_btn.disabled = false;
      }
    }

    document.addEventListener("keydown", e => e.key === "Enter" && login());
  </script>
</body>

</html>
