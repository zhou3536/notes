<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }

    .card {
      border: 2px solid #00000060;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
    }

    h1 {
      color: #222;
      margin-bottom: 20px;
      text-align: center;
      font-size: 30px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      border: 2px solid #00000030;
      border-radius: 8px;
      color: #000;
      font-size: 15px;
      margin-bottom: 18px;
      outline: none;
    }

    input:focus {
      border-color: #0076dd7b;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #6e98ec;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    .error {
      color: #f55;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>账号登录</h1>
    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
    <button onclick="login()">登 录</button>
    <div class="error" id="error"></div>
  </div>
  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const error_box = document.getElementById("error");
      error_box.textContent = "";
      if (!username || !password) { error_box.textContent = '请输入用户名和密码'; return }
      try {
        const res = await fetch("/login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const contentType = res.headers.get("content-type") || "";
        const data = contentType.includes("application/json")
          ? await res.json()
          : { success: false, message: await res.text() };

        if (data.success) {
          const urlParams = new URLSearchParams(window.location.search);
          const redirectTo = urlParams.get('redirect') || '/';
          window.location.href = redirectTo;
        } else {
          error_box.textContent = data.message || "登录失败";
        }
      } catch (error) {
        error_box.textContent = error?.message || "登录失败";
      }
    }

    document.addEventListener("keydown", e => e.key === "Enter" && login());
  </script>
</body>

</html>
